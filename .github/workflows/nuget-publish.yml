name: Publish WS.Matrices to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SourceLink

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Parse version from release tag
        id: version
        # Strips a leading 'v' from the tag (e.g. v1.2.3 -> 1.2.3)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/WS.Matrices/WS.Matrices.csproj

      - name: Build
        run: dotnet build src/WS.Matrices/WS.Matrices.csproj --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/WS.Matrices/WS.Matrices.csproj
          --configuration Release
          --no-build
          -p:PackageVersion=${{ steps.version.outputs.VERSION }}
          --output ./artifacts

      - name: Push package to NuGet.org
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to NuGet.org
        run: >
          dotnet nuget push ./artifacts/*.snupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
